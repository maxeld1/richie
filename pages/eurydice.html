<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noises Off — Richie Izzo</title>
    <link rel="icon" href="../favicon.png" type="image/png" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="page-project page-eurydice">

<div data-include="header"></div>

<main>
    <section class="project-hero">
        <div class="wrap">
            <p class="project-kicker">Play</p>
            <img class="project-cover" src="" alt="Eurydice cover">
            <h1 class="project-title">Eurydice</h1>
            <p class="project-subtitle">Audio cues and score samples.</p>
            <a class="project-back" href="../pages/portfolio.html" aria-label="Back to portfolio">Back to Portfolio</a>
        </div>
    </section>

    <section class="project-gallery">
        <div class="wrap">
            <div class="project-audio-grid" aria-label="Noises Off audio gallery">

                <div class="project-audio-card" data-audio-card>
                    <div class="project-audio-title">They Walk</div>
                    <div class="project-audio-controls">
                        <button class="project-audio-btn" type="button" data-audio-toggle>Play</button>
                        <div class="project-audio-bar" data-audio-bar>
                            <span class="project-audio-progress" data-audio-progress></span>
                        </div>
                        <div class="project-audio-time" data-audio-time>0:00</div>
                    </div>
                    <audio preload="none" data-audio>
                        <source src="../assets/Eurydice/_They%20Walk_.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <div class="project-audio-card" data-audio-card>
                    <div class="project-audio-title">Symphony For 12 Instruments</div>
                    <div class="project-audio-controls">
                        <button class="project-audio-btn" type="button" data-audio-toggle>Play</button>
                        <div class="project-audio-bar" data-audio-bar>
                            <span class="project-audio-progress" data-audio-progress></span>
                        </div>
                        <div class="project-audio-time" data-audio-time>0:00</div>
                    </div>
                    <audio preload="none" data-audio>
                        <source src="../assets/Eurydice/Symphony%20For%2012%20Instruments.mp3" type="audio/mpeg">
                    </audio>
                </div>

                <div class="project-audio-card" data-audio-card>
                    <div class="project-audio-title">Wedding March - Eurydice V.2</div>
                    <div class="project-audio-controls">
                        <button class="project-audio-btn" type="button" data-audio-toggle>Play</button>
                        <div class="project-audio-bar" data-audio-bar>
                            <span class="project-audio-progress" data-audio-progress></span>
                        </div>
                        <div class="project-audio-time" data-audio-time>0:00</div>
                    </div>
                    <audio preload="none" data-audio>
                        <source src="../assets/Eurydice/Wedding%20March%20-%20Eurydice%20V.2.mp3" type="audio/mpeg">
                    </audio>
                </div>

            </div>
        </div>
    </section>
</main>

<div data-include="footer"></div>

<script src="../js/partials.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
