<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Basement — Richie Izzo</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    @font-face{
      font-family: "Antio";
      src: url("../assets/fonts/Antio%20Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    body{
      margin: 0;
      min-height: 100vh;
      padding-top: 0;
      background: url("../assets/The%20Basement/Page%20Background%20Photo.png") center center / cover no-repeat;
    }

    .thebasement-back{
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,.38);
      border-radius: 999px;
      background: rgba(0,0,0,.52);
      backdrop-filter: blur(6px);
      color: #f5ead1;
      font-family: "Antio", var(--sans);
      font-size: 1.25rem;
      letter-spacing: .03em;
      text-transform: uppercase;
      transition: transform .2s ease, background-color .2s ease, border-color .2s ease;
    }

    .thebasement-back::before{
      content: "\2190";
      font-family: var(--sans);
      font-size: .95rem;
      line-height: 1;
    }

    .thebasement-back:hover{
      transform: translateY(-1px);
      background: rgba(0,0,0,.68);
      border-color: rgba(255,255,255,.58);
    }

    .thebasement-title{
      margin: 0;
      padding-top: 24px;
      text-align: center;
      font-family: "Antio", var(--sans);
      font-weight: 400;
      font-size: clamp(3rem, 6vw, 5.5rem);
    }
  </style>
</head>
<body>
  <a class="thebasement-back" href="../index.html" aria-label="Back to homepage">Home</a>
  <h1 class="thebasement-title">The Basement</h1>
</body>
</html>
