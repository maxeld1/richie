<!doctype html>
<html lang="en">
<head>

<body class="page-project">

<div data-include="header"></div>

<main>
  <section class="project-hero">
    <div class="wrap">
      <p class="project-kicker">Play</p>
      <img class="project-cover" src="../assets/Noises%20Off/Cover%20Image.png" alt="Noises Off cover">
      <h1 class="project-title">Noises Off</h1>
      <p class="project-subtitle">Audio cues and score samples.</p>
      <a class="project-back" href="../pages/portfolio.html" aria-label="Back to portfolio">Back to Portfolio</a>

  </section>

        <div class="project-audio-card" data-audio-card>
